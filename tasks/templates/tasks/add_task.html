{% extends "tasks/base.html" %}

{% block title %}Add Task{% endblock %}

{% block content %}

<div class="form-card">
    <h2>Add New Task</h2>

    <form method="POST" class="task-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="submit-btn">Create Task</button>
    </form>
</div>

{% endblock %}
