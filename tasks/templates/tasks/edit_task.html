{% extends "tasks/base.html" %}

{% block title %}
Edit Task
{% endblock %}

{% block content %}

<div class="form-card">
    <h2>Edit Task</h2>

    <form method="POST" class="task-form">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="submit-btn">
                Update Task
            </button>

            <a href="{% url 'task_list' %}" class="cancel-btn">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
