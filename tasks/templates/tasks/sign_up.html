{% extends "tasks/base.html" %}

{% block content %}

<div class="form-card">
    <h2>Create an Account</h2>

    <form method="POST" class="task-form">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="form-actions">
            <button type="submit" class="submit-btn">
                Create Account
            </button>

            <a href="{% url 'sign_up' %}" class="cancel-btn">
                Already have an account?
            </a>
        </div>
    </form>
</div>

{% endblock %}
